<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoRegistro - Operador</title>

  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0b5d52" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-operador">
    <header class="topbar">
      <div class="topbar-left">
        <div class="logo">GR</div>
        <div class="brand">
          <h1>GeoRegistro</h1>
          <p>Registro móvil de incidencias</p>
        </div>
      </div>
    </header>

    <main style="padding: 12px;">
      <section class="panel">
        <div class="panel-header">
          <h3>Registrar incidencia</h3>
        </div>

        <div class="panel-body">
          <div class="field">
            <label for="categoriaOperador">Categoría</label>
            <select id="categoriaOperador">
              <option value="Alumbrado">Alumbrado</option>
              <option value="Basura">Basura</option>
              <option value="Seguridad">Seguridad</option>
              <option value="Áreas Verdes">Áreas Verdes</option>
              <option value="Zoonosis">Zoonosis</option>
              <option value="Infraestructura">Infraestructura</option>
            </select>
          </div>

          <div class="field">
            <label for="descripcionOperador">Descripción</label>
            <input type="text" id="descripcionOperador" />
          </div>

          <div class="field">
            <label for="estadoOperador">Estado</label>
            <select id="estadoOperador">
              <option value="pendiente">Pendiente</option>
              <option value="en_proceso">En proceso</option>
              <option value="resuelto">Resuelto</option>
            </select>
          </div>

          <button class="btn btn-primary" type="button">Guardar incidencia</button>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./js/operador.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then((reg) => console.log("Service Worker registrado:", reg.scope))
          .catch((err) => console.error("Error registrando Service Worker:", err));
      });
    }
  </script>
</body>
</html>
