<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>GeoRegistro - Acceso</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 320px;
    }

    .login-card h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .login-card input {
      width: 100%;
      margin-bottom: 10px;
      height: 38px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .login-card button {
      width: 100%;
      height: 38px;
      border: none;
      background: #0b5d52;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .error {
      color: red;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <h2>GeoRegistro</h2>

    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">

    <button onclick="login()">Ingresar</button>

    <div class="error" id="error"></div>
  </div>

  <!-- Firebase -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>

</body>
</html>
