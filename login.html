<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoRegistro - Acceso</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 340px;
    }

    .login-card h2 {
      margin: 0 0 20px;
      text-align: center;
      color: #1f2a33;
    }

    .login-card form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-card input {
      width: 100%;
      height: 42px;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .login-card button {
      width: 100%;
      height: 42px;
      border: none;
      background: #0b5d52;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
    }

    .login-message {
      min-height: 18px;
      font-size: 12px;
      text-align: center;
      color: #b00020;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2>GeoRegistro</h2>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Correo" required />
      <input type="password" id="password" placeholder="Contraseña" required />
      <button type="submit">Ingresar</button>
    </form>

    <div id="loginMessage" class="login-message"></div>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
