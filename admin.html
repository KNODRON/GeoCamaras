<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoRegistro | Administrador</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet-gesture-handling/dist/leaflet-gesture-handling.min.css"
  />
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-mini">GR</div>
      <div>
        <h1>GeoRegistro</h1>
        <p>Panel Administrador</p>
      </div>
    </div>

    <div class="topbar-right">
      <span id="adminName" class="user-badge">Administrador</span>
      <button id="changePasswordBtn" class="btn-secondary">Cambiar contraseña</button>
      <button id="logoutBtn" class="btn-secondary">Cerrar sesión</button>
    </div>
  </header>

  <main class="admin-shell">
    <aside class="admin-sidebar">
      <div class="sidebar-block">
        <h3>Resumen</h3>

        <div class="sidebar-stats">
          <div class="sidebar-stat">
            <span>Total</span>
            <strong id="statTotal">0</strong>
          </div>
          <div class="sidebar-stat">
            <span>Hoy</span>
            <strong id="statHoy">0</strong>
          </div>
          <div class="sidebar-stat">
            <span>Pendientes</span>
            <strong id="statPendientes">0</strong>
          </div>
          <div class="sidebar-stat">
            <span>Resueltas</span>
            <strong id="statResueltas">0</strong>
          </div>
        </div>
      </div>

      <div class="sidebar-block">
        <h3>Filtros</h3>

        <select id="filtroCategoria">
          <option value="">Todas las categorías</option>
          <option value="Alumbrado">Alumbrado</option>
          <option value="Basura">Basura</option>
          <option value="Seguridad">Seguridad</option>
          <option value="Áreas Verdes">Áreas Verdes</option>
          <option value="Zoonosis">Zoonosis</option>
          <option value="Infraestructura">Infraestructura</option>
        </select>

        <select id="filtroEstado">
          <option value="">Todos los estados</option>
          <option value="pendiente">Pendiente</option>
          <option value="en_proceso">En proceso</option>
          <option value="resuelto">Resuelto</option>
        </select>

        <label class="map-toggle">
          <input type="checkbox" id="toggleResueltos">
          Mostrar resueltas en mapa
        </label>

        <label class="map-toggle">
          <input type="checkbox" id="toggleHeatmap">
          Mostrar mapa de calor
        </label>

        <div class="sidebar-actions">
          <button id="btnLimpiarFiltros" class="btn-secondary">Limpiar filtros</button>
          <button id="btnExportarCSV" class="btn-primary">Exportar CSV</button>
        </div>
      </div>

      <div class="sidebar-block">
        <h3>Vista</h3>

        <div class="view-switch">
          <button id="btnVistaMapa" class="btn-primary">Mapa</button>
          <button id="btnVistaListado" class="btn-secondary">Incidencias</button>
        </div>
      </div>
    </aside>

    <section class="admin-main">
      <section id="vistaMapa" class="admin-view active">
        <div class="map-toolbar">
          <h2>Mapa táctico</h2>

          <div class="map-base-switch">
            <button id="btnMapaBase" class="btn-secondary">Mapa</button>
            <button id="btnMapaSatelital" class="btn-secondary">Satelital</button>
          </div>
        </div>

        <div id="mapAdmin"></div>
      </section>

      <section id="vistaListado" class="admin-view">
        <div class="list-toolbar">
          <h2>Listado de incidencias</h2>
          <button id="btnVolverMapa" class="btn-secondary">Volver al mapa</button>
        </div>

        <div class="table-wrapper">
          <table class="data-table">
            <thead>
              <tr>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Dirección</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Usuario</th>
                <th>Mapa</th>
              </tr>
            </thead>
            <tbody id="tablaIncidenciasBody"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    crossorigin=""
  ></script>
  <script src="https://unpkg.com/leaflet-gesture-handling"></script>
  <script
    src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"
    crossorigin=""
  ></script>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
