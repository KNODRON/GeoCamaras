<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b6b3a" />
  <title>GeoCámaras</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>GeoCámaras</h1>
        <p>Catastro georreferenciado de cámaras</p>
      </div>
      <div id="userInfo" class="user-info">Sin sesión</div>
    </header>

    <section class="card auth-card" id="authCard">
      <h2>Ingreso</h2>

      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="correo@dominio.cl" />

      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="********" />

      <div class="actions">
        <button id="btnLogin" class="action-btn">Ingresar</button>
        <button id="btnLogout" class="action-btn secondary">Salir</button>
      </div>

      <div id="authStatus" class="status-box">Esperando inicio de sesión...</div>
    </section>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="registrar">Registrar</button>
      <button class="tab-btn" data-tab="mapa">Mapa</button>
      <button class="tab-btn" data-tab="registros">Registros</button>
    </nav>

    <main class="main-content">
      <section class="tab-panel active" id="tab-registrar">
        <div class="card">
          <h2>Registro rápido</h2>
          <p class="muted">Toca una categoría y se guardará la ubicación actual.</p>

          <div class="button-grid">
            <button class="type-btn" data-type="Casa">🏠 Casa</button>
            <button class="type-btn" data-type="Edificio">🏢 Edificio</button>
            <button class="type-btn" data-type="Colegio">🏫 Colegio</button>
            <button class="type-btn" data-type="Empresa">🏭 Empresa</button>
            <button class="type-btn" data-type="Municipal">🚓 Municipal</button>
            <button class="type-btn" data-type="Transporte">🚌 Transporte</button>
          </div>
        </div>

        <div class="card">
          <h2>Detalle del registro</h2>

          <label for="observacion">Observación</label>
          <input type="text" id="observacion" placeholder="Ej: esquina, frente a local" maxlength="120" />

          <label for="direccionRef">Referencia / Dirección</label>
          <input type="text" id="direccionRef" placeholder="Ej: Av. X con calle Y" maxlength="120" />

          <div class="actions">
            <button id="btnUbicacion" class="action-btn secondary">📍 Ver mi ubicación</button>
            <button id="btnLimpiarCampos" class="action-btn ghost">Limpiar campos</button>
          </div>

          <div id="statusBox" class="status-box">Esperando registro...</div>
        </div>
      </section>

      <section class="tab-panel" id="tab-mapa">
        <div class="card card-map">
          <h2>Mapa compartido</h2>
          <div id="map"></div>

          <div class="actions">
            <button id="btnCentrarMapa" class="action-btn">🎯 Centrar en mi ubicación</button>
            <button id="btnActualizarMapa" class="action-btn secondary">🔄 Actualizar mapa</button>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="tab-registros">
        <div class="card">
          <h2>Registros</h2>
          <div id="recordsList" class="records-list"></div>
        </div>
      </section>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script type="module" src="app.js"></script>
</body>
</html>
